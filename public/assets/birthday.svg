<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#fff9e6"/>
  
  <!-- Wall decorations - Balloons -->
  <circle cx="50" cy="60" r="15" fill="#ff0000"/>
  <line x1="50" y1="75" x2="50" y2="120" stroke="#666" stroke-width="1"/>
  
  <circle cx="350" cy="80" r="15" fill="#00ff00"/>
  <line x1="350" y1="95" x2="350" y2="140" stroke="#666" stroke-width="1"/>
  
  <circle cx="100" cy="40" r="15" fill="#ffff00"/>
  <line x1="100" y1="55" x2="100" y2="100" stroke="#666" stroke-width="1"/>
  
  <circle cx="300" cy="50" r="15" fill="#0000ff"/>
  <line x1="300" y1="65" x2="300" y2="110" stroke="#666" stroke-width="1"/>
  
  <!-- Cake -->
  <rect x="150" y="140" width="100" height="60" fill="#d2691e"/>
  <rect x="145" y="135" width="110" height="10" fill="#ffc0cb"/>
  <line x1="160" y1="130" x2="165" y2="115" stroke="#ff6347" stroke-width="3"/>
  <line x1="180" y1="128" x2="185" y2="110" stroke="#ffff00" stroke-width="3"/>
  <line x1="200" y1="130" x2="205" y2="115" stroke="#ff6347" stroke-width="3"/>
  <line x1="220" y1="128" x2="225" y2="110" stroke="#ffff00" stroke-width="3"/>
  <line x1="240" y1="130" x2="245" y2="115" stroke="#ff6347" stroke-width="3"/>
  <!-- Candles -->
  <circle cx="165" cy="112" r="2" fill="#ffff00"/>
  <circle cx="185" cy="108" r="2" fill="#ffff00"/>
  <circle cx="205" cy="112" r="2" fill="#ffff00"/>
  <circle cx="225" cy="108" r="2" fill="#ffff00"/>
  <circle cx="245" cy="112" r="2" fill="#ffff00"/>
  
  <!-- Children around table -->
  <!-- Child 1 -->
  <circle cx="80" cy="180" r="9" fill="#ffcc99"/>
  <rect x="72" y="195" width="16" height="25" fill="#3366cc"/>
  
  <!-- Child 2 -->
  <circle cx="200" cy="220" r="9" fill="#ffcc99"/>
  <rect x="192" y="235" width="16" height="25" fill="#ff66cc"/>
  
  <!-- Child 3 -->
  <circle cx="320" cy="185" r="9" fill="#ffcc99"/>
  <rect x="312" y="200" width="16" height="25" fill="#ff9966"/>
  
  <!-- Party hats -->
  <polygon points="85,165 95,165 90,150" fill="#ff1493"/>
  <polygon points="205,205 215,205 210,190" fill="#ff1493"/>
  <polygon points="325,170 335,170 330,155" fill="#ff1493"/>
  
  <!-- Presents/Gift boxes -->
  <rect x="250" y="220" width="25" height="25" fill="#ff0000"/>
  <rect x="258" y="210" width="9" height="35" fill="#ffff00"/>
  
  <!-- Party decorations - Streamers -->
  <line x1="50" y1="20" x2="150" y2="80" stroke="#ff69b4" stroke-width="2"/>
  <line x1="350" y1="20" x2="250" y2="80" stroke="#00ff00" stroke-width="2"/>
  
  <!-- Title -->
  <text x="200" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">
    Birthday Party
  </text>
</svg>