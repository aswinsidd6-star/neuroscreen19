<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - Kitchen -->
  <rect width="400" height="300" fill="#f5f0e8"/>
  
  <!-- Wall -->
  <rect width="400" height="250" fill="#e8dcc8"/>
  
  <!-- Floor -->
  <rect y="250" width="400" height="50" fill="#d4a574"/>
  
  <!-- Sink counter -->
  <rect x="20" y="120" width="140" height="80" fill="#c0a080"/>
  
  <!-- Sink -->
  <ellipse cx="90" cy="160" rx="40" ry="15" fill="#8899aa"/>
  
  <!-- Overflowing water -->
  <path d="M 50 175 Q 40 190 30 250" stroke="#4488cc" stroke-width="8" fill="none" opacity="0.6"/>
  <path d="M 90 175 Q 85 195 80 250" stroke="#4488cc" stroke-width="8" fill="none" opacity="0.6"/>
  
  <!-- Woman figure at sink -->
  <circle cx="85" cy="80" r="12" fill="#ffcc99"/>
  <rect x="75" y="100" width="20" height="30" fill="#ff9966"/>
  <rect x="70" y="135" width="30" height="20" fill="#333"/>
  
  <!-- Cupboard with jar -->
  <rect x="280" y="40" width="100" height="120" fill="#8b6f47"/>
  <rect x="290" y="50" width="80" height="100" fill="#a0826d"/>
  
  <!-- Cookie jar -->
  <circle cx="330" cy="90" r="18" fill="#d4a574"/>
  <ellipse cx="330" cy="90" rx="18" ry="12" fill="#c0956a"/>
  
  <!-- Cookies in jar -->
  <circle cx="325" cy="85" r="4" fill="#8b4513"/>
  <circle cx="335" cy="88" r="4" fill="#8b4513"/>
  
  <!-- Stool (tipping) -->
  <rect x="310" y="160" width="35" height="40" fill="#a0826d" transform="rotate(-20 327 180)"/>
  <rect x="305" y="200" width="8" height="45" fill="#8b6f47" transform="rotate(-20 309 220)"/>
  <rect x="337" y="200" width="8" height="45" fill="#8b6f47" transform="rotate(-20 341 220)"/>
  
  <!-- Boy on stool reaching -->
  <circle cx="330" cy="130" r="10" fill="#ffcc99"/>
  <rect x="322" y="145" width="16" height="32" fill="#3366cc"/>
  <rect x="315" y="178" width="10" height="28" fill="#666"/>
  <rect x="330" y="122" width="7" height="25" fill="#ffcc99"/>
  
  <!-- Girl watching -->
  <circle cx="200" cy="110" r="10" fill="#ffcc99"/>
  <rect x="192" y="125" width="16" height="28" fill="#ff66cc"/>
  <rect x="185" y="158" width="10" height="20" fill="#666"/>
  
  <!-- Window -->
  <rect x="150" y="50" width="80" height="70" fill="#b3d9ff" stroke="#333" stroke-width="2"/>
  <line x1="190" y1="50" x2="190" y2="120" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="85" x2="230" y2="85" stroke="#333" stroke-width="2"/>
  
  <!-- Dishes/plates on counter -->
  <ellipse cx="50" cy="130" rx="12" ry="8" fill="#fff" stroke="#666" stroke-width="1"/>
  <ellipse cx="70" cy="125" rx="12" ry="8" fill="#fff" stroke="#666" stroke-width="1"/>
  
  <!-- Title -->
  <text x="200" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">
    Boston Cookie Theft Picture
  </text>
</svg>