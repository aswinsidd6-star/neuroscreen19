<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Wall background -->
  <rect width="400" height="300" fill="#e8f4f8"/>
  
  <!-- Door -->
  <rect x="330" y="100" width="50" height="120" fill="#a0826d"/>
  <circle cx="375" cy="160" r="3" fill="#ffd700"/>
  
  <!-- Doctor's desk -->
  <rect x="180" y="140" width="120" height="70" fill="#8b6f47"/>
  
  <!-- Desk items -->
  <!-- Lamp -->
  <rect x="195" y="120" width="4" height="20" fill="#333"/>
  <ellipse cx="197" cy="120" rx="12" ry="5" fill="#ffff00"/>
  
  <!-- Books/Papers -->
  <rect x="280" y="150" width="15" height="18" fill="#ff0000"/>
  <rect x="300" y="152" width="15" height="16" fill="#0000ff"/>
  
  <!-- Computer (old style) -->
  <rect x="240" y="155" width="25" height="20" fill="#666"/>
  <rect x="255" y="160" width="35" height="3" fill="#ccc"/>
  
  <!-- Doctor -->
  <circle cx="240" cy="90" r="11" fill="#ffcc99"/>
  <rect x="233" y="105" width="14" height="35" fill="#fff"/>
  <line x1="225" y1="115" x2="210" y2="130" stroke="#ffcc99" stroke-width="4"/>
  <line x1="255" y1="115" x2="270" y2="130" stroke="#ffcc99" stroke-width="4"/>
  
  <!-- Stethoscope -->
  <path d="M 233 105 Q 220 100 215 115" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Patient chair -->
  <rect x="80" y="140" width="40" height="50" fill="#9370db"/>
  <circle cx="90" cy="200" r="5" fill="#444"/>
  <circle cx="110" cy="200" r="5" fill="#444"/>
  
  <!-- Patient -->
  <circle cx="100" cy="110" r="9" fill="#ffcc99"/>
  <rect x="92" y="125" width="16" height="25" fill="#ff9966"/>
  
  <!-- Medical equipment -->
  <!-- Height measure -->
  <line x1="130" y1="60" x2="130" y2="200" stroke="#666" stroke-width="2"/>
  <line x1="125" y1="200" x2="135" y2="200" stroke="#666" stroke-width="2"/>
  
  <!-- Blood pressure machine -->
  <rect x="40" y="80" width="30" height="40" fill="#c0c0c0" stroke="#666" stroke-width="1"/>
  <circle cx="47" cy="95" r="6" fill="#fff" stroke="#000" stroke-width="1"/>
  <line x1="55" y1="100" x2="68" y2="90" stroke="#666" stroke-width="2"/>
  
  <!-- Window with medical poster -->
  <rect x="280" y="30" width="80" height="80" fill="#b3d9ff" stroke="#333" stroke-width="2"/>
  <text x="320" y="75" font-family="Arial" font-size="10" text-anchor="middle" fill="#000">
    Health
  </text>
  <text x="320" y="90" font-family="Arial" font-size="10" text-anchor="middle" fill="#000">
    Tips
  </text>
  
  <!-- Title -->
  <text x="200" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">
    Doctor's Office
  </text>
</svg>