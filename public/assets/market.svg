<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="400" height="120" fill="#87ceeb"/>
  
  <!-- Ground/Market floor -->
  <rect y="120" width="400" height="180" fill="#d4a574"/>
  
  <!-- Market stall 1 -->
  <rect x="30" y="80" width="100" height="80" fill="#a0826d"/>
  <rect x="25" y="70" width="110" height="15" fill="#ff6347"/>
  <!-- Roof poles -->
  <line x1="40" y1="70" x2="40" y2="160" stroke="#8b4513" stroke-width="2"/>
  <line x1="120" y1="70" x2="120" y2="160" stroke="#8b4513" stroke-width="2"/>
  
  <!-- Fruits/Vegetables on stall -->
  <circle cx="50" cy="130" r="6" fill="#ff0000"/>
  <circle cx="65" cy="128" r="6" fill="#ff8800"/>
  <circle cx="80" cy="132" r="6" fill="#ffff00"/>
  <circle cx="95" cy="129" r="6" fill="#ff0000"/>
  
  <!-- Market stall 2 -->
  <rect x="270" y="85" width="100" height="75" fill="#a0826d"/>
  <rect x="265" y="75" width="110" height="15" fill="#0099ff"/>
  <!-- Roof poles -->
  <line x1="280" y1="75" x2="280" y2="160" stroke="#8b4513" stroke-width="2"/>
  <line x1="360" y1="75" x2="360" y2="160" stroke="#8b4513" stroke-width="2"/>
  
  <!-- Goods on stall 2 -->
  <rect x="285" y="125" width="12" height="18" fill="#8b0000"/>
  <rect x="310" y="128" width="12" height="15" fill="#ff69b4"/>
  <rect x="335" y="122" width="12" height="20" fill="#4169e1"/>
  
  <!-- Vendors -->
  <!-- Vendor 1 -->
  <circle cx="60" cy="50" r="9" fill="#ffcc99"/>
  <rect x="52" y="62" width="16" height="22" fill="#333"/>
  
  <!-- Vendor 2 -->
  <circle cx="310" cy="55" r="9" fill="#ffcc99"/>
  <rect x="302" y="67" width="16" height="22" fill="#333"/>
  
  <!-- Customers -->
  <!-- Customer 1 -->
  <circle cx="150" cy="120" r="8" fill="#ffcc99"/>
  <rect x="143" y="132" width="14" height="20" fill="#ff9966"/>
  <!-- Basket -->
  <rect x="140" y="155" width="20" height="12" fill="#8b4513"/>
  
  <!-- Customer 2 -->
  <circle cx="200" cy="125" r="8" fill="#ffcc99"/>
  <rect x="193" y="137" width="14" height="20" fill="#ff66cc"/>
  <!-- Shopping bags -->
  <rect x="185" y="160" width="15" height="15" fill="#ff0000"/>
  
  <!-- Sign -->
  <rect x="160" y="30" width="80" height="25" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="200" y="48" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">
    Market
  </text>
  
  <!-- Title -->
  <text x="200" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">
    Market & Shopping
  </text>
</svg>