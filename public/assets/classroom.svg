<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Wall background -->
  <rect width="400" height="300" fill="#e8d4b0"/>
  
  <!-- Blackboard/Whiteboard -->
  <rect x="240" y="20" width="140" height="100" fill="#2f4f4f"/>
  <line x1="260" y1="40" x2="360" y2="40" stroke="#fff" stroke-width="2"/>
  <line x1="260" y1="60" x2="360" y2="60" stroke="#fff" stroke-width="2"/>
  <line x1="260" y1="80" x2="360" y2="80" stroke="#fff" stroke-width="2"/>
  
  <!-- Desk -->
  <rect x="20" y="200" width="120" height="60" fill="#a0826d"/>
  
  <!-- Chair -->
  <rect x="30" y="130" width="30" height="40" fill="#8b4513"/>
  <circle cx="32" cy="170" r="4" fill="#444"/>
  <circle cx="58" cy="170" r="4" fill="#444"/>
  
  <!-- Teacher -->
  <circle cx="300" cy="150" r="12" fill="#ffcc99"/>
  <rect x="292" y="168" width="16" height="35" fill="#444"/>
  <rect x="285" y="180" width="8" height="28" fill="#ffcc99"/>
  
  <!-- Students -->
  <!-- Student 1 -->
  <circle cx="80" cy="130" r="9" fill="#ffcc99"/>
  <rect x="72" y="145" width="16" height="28" fill="#ff9966"/>
  
  <!-- Student 2 -->
  <circle cx="150" cy="140" r="9" fill="#ffcc99"/>
  <rect x="142" y="155" width="16" height="28" fill="#3366cc"/>
  
  <!-- Student 3 -->
  <circle cx="220" cy="135" r="9" fill="#ffcc99"/>
  <rect x="212" y="150" width="16" height="28" fill="#ff66cc"/>
  
  <!-- Books on desk -->
  <rect x="35" y="210" width="15" height="20" fill="#ff0000"/>
  <rect x="55" y="212" width="15" height="18" fill="#0000ff"/>
  
  <!-- Flag -->
  <rect x="20" y="15" width="4" height="80" fill="#333"/>
  <polygon points="24,20 24,35 40,27" fill="#ff0000"/>
  
  <!-- Window -->
  <rect x="120" y="30" width="80" height="70" fill="#b3d9ff" stroke="#333" stroke-width="2"/>
  <line x1="160" y1="30" x2="160" y2="100" stroke="#333" stroke-width="1"/>
  <line x1="120" y1="65" x2="200" y2="65" stroke="#333" stroke-width="1"/>
  
  <!-- Title -->
  <text x="200" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">
    Classroom Scene
  </text>
</svg>