<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="400" height="120" fill="#87ceeb"/>
  
  <!-- Sea -->
  <rect y="120" width="400" height="100" fill="#1e90ff"/>
  
  <!-- Sand -->
  <rect y="220" width="400" height="80" fill="#f4a460"/>
  
  <!-- Sun -->
  <circle cx="80" cy="40" r="25" fill="#ffd700"/>
  
  <!-- Ocean waves -->
  <path d="M 0 130 Q 25 120 50 130 T 100 130 T 150 130 T 200 130 T 250 130 T 300 130 T 350 130 T 400 130" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Umbrella -->
  <circle cx="80" cy="200" r="25" fill="#ff6347"/>
  <line x1="80" y1="225" x2="80" y2="270" stroke="#8b4513" stroke-width="3"/>
  <circle cx="80" cy="270" r="3" fill="#666"/>
  
  <!-- Family at beach -->
  <!-- Adult -->
  <circle cx="150" cy="180" r="10" fill="#ffcc99"/>
  <rect x="142" y="195" width="16" height="30" fill="#ff9966"/>
  
  <!-- Child 1 -->
  <circle cx="180" cy="200" r="8" fill="#ffcc99"/>
  <rect x="173" y="212" width="14" height="20" fill="#3366cc"/>
  
  <!-- Child 2 with bucket -->
  <circle cx="210" cy="205" r="7" fill="#ffcc99"/>
  <rect x="203" y="215" width="14" height="18" fill="#ff66cc"/>
  <rect x="215" y="225" width="12" height="12" fill="#ff6347"/>
  
  <!-- Shells -->
  <path d="M 120 255 Q 125 245 130 255" stroke="#daa520" stroke-width="2" fill="none"/>
  <path d="M 250 260 Q 255 250 260 260" stroke="#daa520" stroke-width="2" fill="none"/>
  
  <!-- Boat in distance -->
  <rect x="300" y="140" width="40" height="15" fill="#8b4513"/>
  <polygon points="320,140 330,120 310,120" fill="#ff0000"/>
  
  <!-- Title -->
  <text x="200" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">
    Beach Day
  </text>
</svg>